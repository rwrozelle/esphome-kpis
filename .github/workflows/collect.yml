name: Collect KPIs

on:
  schedule:
    - cron: "0 3 * * *"  # nightly 03:00 UTC
  workflow_dispatch:
    inputs:
      components:
        description: "Space-separated component names to collect (leave empty for all)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Restore GitHub API cache
        uses: actions/cache@v4
        with:
          path: data/github_cache.json
          key: github-api-cache-${{ github.run_id }}
          restore-keys: |
            github-api-cache-

      - name: Clone esphome (full history)
        run: |
          git clone https://github.com/esphome/esphome.git esphome-src
          git -C esphome-src fetch --unshallow

      - name: Collect KPIs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--esphome-root esphome-src --output data/components.json --cache data/github_cache.json"
          if [ -n "${{ github.event.inputs.components }}" ]; then
            ARGS="$ARGS --components ${{ github.event.inputs.components }}"
          fi
          esphome-kpis $ARGS

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/components.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update component KPIs $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Render HTML
        run: |
          mkdir -p _site
          esphome-kpis-render data/components.json -o _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
