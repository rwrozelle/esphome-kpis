name: Collect KPIs

on:
  schedule:
    - cron: "0 3 * * 0"  # weekly, Sunday 03:00 UTC
  workflow_dispatch:
    inputs:
      components:
        description: "Space-separated component names to collect (leave empty for all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Clone esphome (full history)
        run: |
          git clone https://github.com/esphome/esphome.git /tmp/esphome
          git -C /tmp/esphome fetch --unshallow

      - name: Collect KPIs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--esphome-root /tmp/esphome --output data/components.json"
          if [ -n "${{ github.event.inputs.components }}" ]; then
            ARGS="$ARGS --components ${{ github.event.inputs.components }}"
          fi
          esphome-kpis $ARGS

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/components.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update component KPIs $(date -u +%Y-%m-%d)"
            git push
          fi
